name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify release-please config is in sync
        run: scripts/sync-release-config.sh --check

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Upload per-package tarballs to GitHub Releases
  #
  # Tag convention (must match release-please v4 and tarball.ts buildReleaseTag):
  #   Simple:   packages/pi-template          → pi-template-v0.2.0
  #   Nested:   packages/@scope/my-pkg        → @scope--my-pkg-v1.0.0
  #
  #   Rule: strip "packages/", replace remaining "/" with "--", then "-v" + version.
  #   release-please v4 creates tags in this format for manifest-mode monorepos.
  #
  # Tarball naming: {pkg-name}-{version}.tgz  (e.g. pi-template-0.2.0.tgz)
  # ---------------------------------------------------------------------------
  upload-artifacts:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        path: ${{ fromJson(needs.release-please.outputs.paths_released) }}
      # If one package fails, still upload the others
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      # Diagnostic: show which package is being processed
      - name: Show matrix context
        run: |
          echo "Processing path: ${{ matrix.path }}"
          echo "Package name: $(jq -r '.name' '${{ matrix.path }}/package.json')"
          echo "Package version: $(jq -r '.version' '${{ matrix.path }}/package.json')"

      # Pack + validate via the shared lib script. Same logic as
      # scripts/validate-release-tarball.sh — if local validate passes,
      # this CI step packs identical contents.
      - name: Pack tarball
        run: |
          source scripts/lib/release-tarball.sh
          pkg_name=$(jq -r '.name' "${{ matrix.path }}/package.json")
          pkg_version=$(jq -r '.version' "${{ matrix.path }}/package.json")
          tarball="${pkg_name}-${pkg_version}.tgz"

          pack_release_tarball "${{ matrix.path }}" "${tarball}"
          echo "tarball=${tarball}" >> "$GITHUB_ENV"

          echo "--- Tarball contents ---"
          tar -tzf "${tarball}"
          echo "--- Tarball size ---"
          ls -lh "${tarball}"

      - name: Validate tarball contents
        run: |
          source scripts/lib/release-tarball.sh
          echo "=== Validating tarball: ${tarball} ==="
          validate_release_tarball "${tarball}"

      # Build the tag body: strip "packages/" prefix, replace "/" with "--"
      # Then search for release-please tag: {tag-body}-v{version}
      - name: Get release tag
        id: tag
        run: |
          # Tag body: strip packages/ prefix, replace remaining slashes with --
          tag=$(echo "${{ matrix.path }}" | sed 's|packages/||; s|/|--|g')
          echo "Resolved tag body: ${tag}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Upload with robust tag search and diagnostic error output
      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pkg_version=$(jq -r '.version' "${{ matrix.path }}/package.json")
          echo "Searching for release tag matching: ${{ steps.tag.outputs.tag }}-v${pkg_version}"
          release_tag=$(gh release list --limit 20 --json tagName --jq ".[].tagName" | grep -E "${{ steps.tag.outputs.tag }}-v${pkg_version}$|v${pkg_version}$" | head -1)
          if [ -z "$release_tag" ]; then
            echo "::error::Could not find release tag for ${{ matrix.path }} v${pkg_version}"
            echo "Searched pattern: ${{ steps.tag.outputs.tag }}-v${pkg_version}"
            echo "Available tags:"
            gh release list --limit 20 --json tagName --jq ".[].tagName" | sed 's/^/  /'
            exit 1
          fi
          echo "Resolved release tag: ${release_tag}"
          gh release upload "$release_tag" "$tarball" --clobber
          echo "Upload complete: ${tarball} → ${release_tag}"

  # ---------------------------------------------------------------------------
  # Post-release smoke install
  #
  # For each just-released package, download the published GitHub release
  # tarball over the actual public CDN and re-validate it with the same
  # invariants the upload step ran on the local file. This catches:
  #   - Tag-format / URL-construction drift between release-please and
  #     tarball.ts buildReleaseTag / buildTarballUrl
  #   - Upload step skipping a file or attaching the wrong artifact
  #   - GitHub CDN serving something different from what we uploaded
  #
  # continue-on-error: true — smoke flakes (e.g. CDN propagation delays)
  # must never fail a release. Failures are visible in the workflow run.
  # ---------------------------------------------------------------------------
  smoke-install:
    needs: [release-please, upload-artifacts]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        path: ${{ fromJson(needs.release-please.outputs.paths_released) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Download released tarball + revalidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source scripts/lib/release-tarball.sh

          pkg_name=$(jq -r '.name' "${{ matrix.path }}/package.json")
          pkg_version=$(jq -r '.version' "${{ matrix.path }}/package.json")
          tag_body=$(echo "${{ matrix.path }}" | sed 's|packages/||; s|/|--|g')
          tag="${tag_body}-v${pkg_version}"
          filename="${pkg_name}-${pkg_version}.tgz"
          url="https://github.com/${{ github.repository }}/releases/download/${tag}/${filename}"

          echo "Smoke target: ${url}"

          # Retry with backoff — newly-uploaded release assets can take a few
          # seconds before the CDN serves them.
          downloaded=false
          for attempt in 1 2 3 4 5; do
            if curl -fsSL --retry 0 -o "${filename}" "${url}"; then
              downloaded=true
              break
            fi
            echo "Attempt ${attempt} failed; sleeping $((attempt * 5))s before retry"
            sleep $((attempt * 5))
          done

          if [ "${downloaded}" != "true" ]; then
            echo "::warning::Smoke download failed for ${url} after 5 attempts"
            exit 1
          fi

          echo "--- Downloaded ${filename} ---"
          ls -lh "${filename}"

          # Reuse the exact same validation the upload job ran locally
          validate_release_tarball "${filename}"
          rm -f "${filename}"
