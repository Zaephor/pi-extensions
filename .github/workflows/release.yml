name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-release-config:
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.generate.outputs.config }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate release-please config from packages
        id: generate
        run: |
          # Scan packages/ for dirs with package.json + src/ (same logic as CI detect-packages)
          # Build the release-please packages config dynamically
          packages_config=$(
            for d in packages/*/; do
              [ -f "$d/package.json" ] && [ -d "$d/src" ] || continue
              # Strip trailing slash and packages/ prefix
              pkg_path="${d%/}"
              echo "$pkg_path"
            done | jq -R -s -c '
              split("\n") | map(select(length > 0))
              | map({ key: ., value: { "release-type": "node", "changelog-type": "default" } })
              | from_entries
            '
          )

          # Preserve bootstrap-sha if it exists in the checked-in config
          bootstrap_sha=$(jq -r '."bootstrap-sha" // empty' release-please-config.json)
          if [ -n "$bootstrap_sha" ] && [ "$bootstrap_sha" != "null" ]; then
            config=$(echo "$packages_config" | jq --arg sha "$bootstrap_sha" '. + {"bootstrap-sha": $sha}')
          else
            config="$packages_config"
          fi

          # Use heredoc delimiter for multi-line output (GITHUB_OUTPUT multiline format)
          delimiter="$(openssl rand -hex 16)"
          echo "config<<${delimiter}" >> "$GITHUB_OUTPUT"
          echo "$config" >> "$GITHUB_OUTPUT"
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      - name: Seed manifest entries for new packages
        run: |
          # Ensure every discovered package has an entry in .release-please-manifest.json.
          # If a package is missing, seed it with the version from its package.json.
          # Release-please manages versions after the initial entry.
          manifest=$(cat .release-please-manifest.json)
          for d in packages/*/; do
            [ -f "$d/package.json" ] && [ -d "$d/src" ] || continue
            pkg_path="${d%/}"
            if echo "$manifest" | jq -e --arg p "$pkg_path" 'has($p)' > /dev/null 2>&1; then
              continue
            fi
            version=$(jq -r '.version // "0.0.0"' "$d/package.json")
            echo "Seeding manifest entry: $pkg_path -> $version"
            manifest=$(echo "$manifest" | jq --arg p "$pkg_path" --arg v "$version" '. + {($p): $v}')
          done
          echo "$manifest" > .release-please-manifest.json
          cat .release-please-manifest.json

  release-please:
    needs: generate-release-config
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: actions/checkout@v4

      - name: Write dynamic release-please config
        run: |
          # Write the generated config — use printf to avoid echo interpreting escape sequences
          printf '%s\n' '${{ needs.generate-release-config.outputs.config }}' > release-please-config.json

      - name: Seed manifest entries for new packages
        run: |
          manifest=$(cat .release-please-manifest.json)
          for d in packages/*/; do
            [ -f "$d/package.json" ] && [ -d "$d/src" ] || continue
            pkg_path="${d%/}"
            if echo "$manifest" | jq -e --arg p "$pkg_path" 'has($p)' > /dev/null 2>&1; then
              continue
            fi
            version=$(jq -r '.version // "0.0.0"' "$d/package.json")
            echo "Seeding manifest entry: $pkg_path -> $version"
            manifest=$(echo "$manifest" | jq --arg p "$pkg_path" --arg v "$version" '. + {($p): $v}')
          done
          echo "$manifest" > .release-please-manifest.json

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Upload per-package tarballs to GitHub Releases
  #
  # Tag convention (must match release-please v4 and tarball.ts buildReleaseTag):
  #   Simple:   packages/pi-template          → pi-template-v0.2.0
  #   Nested:   packages/@scope/my-pkg        → @scope--my-pkg-v1.0.0
  #
  #   Rule: strip "packages/", replace remaining "/" with "--", then "-v" + version.
  #   release-please v4 creates tags in this format for manifest-mode monorepos.
  #
  # Tarball naming: {pkg-name}-{version}.tgz  (e.g. pi-template-0.2.0.tgz)
  # ---------------------------------------------------------------------------
  upload-artifacts:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        path: ${{ fromJson(needs.release-please.outputs.paths_released) }}
      # If one package fails, still upload the others
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      # Diagnostic: show which package is being processed
      - name: Show matrix context
        run: |
          echo "Processing path: ${{ matrix.path }}"
          echo "Package name: $(jq -r '.name' '${{ matrix.path }}/package.json')"
          echo "Package version: $(jq -r '.version' '${{ matrix.path }}/package.json')"

      # Create tarball with exclusions — no node_modules, no .git, no hidden files
      - name: Pack tarball
        run: |
          pkg_name=$(jq -r '.name' "${{ matrix.path }}/package.json")
          pkg_version=$(jq -r '.version' "${{ matrix.path }}/package.json")
          tarball="${pkg_name}-${pkg_version}.tgz"
          echo "Creating tarball: ${tarball} from ${{ matrix.path }}"
          tar -czf "$tarball" \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.*' \
            -C "$(dirname '${{ matrix.path }}')" "$(basename '${{ matrix.path }}')"
          echo "tarball=$tarball" >> "$GITHUB_ENV"
          # Validate tarball contents
          echo "--- Tarball contents ---"
          tar -tzf "$tarball" | head -30
          echo "--- Tarball size ---"
          ls -lh "$tarball"

      # Validate tarball contents: src/ present, package.json has pi manifest, no node_modules
      - name: Validate tarball contents
        run: |
          echo "=== Validating tarball: ${tarball} ==="
          validate_dir=$(mktemp -d)
          tar -xzf "$tarball" -C "$validate_dir"
          
          # Find the extracted package directory (single top-level dir)
          pkg_dir=$(ls "$validate_dir")
          echo "Extracted to: ${validate_dir}/${pkg_dir}"
          
          errors=0
          
          # 1. Check src/ directory exists
          if [ -d "${validate_dir}/${pkg_dir}/src" ]; then
            echo "✅ src/ directory found"
          else
            echo "❌ FAIL: src/ directory missing"
            errors=$((errors + 1))
          fi
          
          # 2. Check package.json exists and has pi manifest (pi.extensions or pi-package keyword)
          pj="${validate_dir}/${pkg_dir}/package.json"
          if [ -f "$pj" ]; then
            has_pi_ext=$(jq -e '.pi.extensions' "$pj" > /dev/null 2>&1 && echo "yes" || echo "no")
            has_pi_kw=$(jq -e '.keywords | index("pi-package")' "$pj" > /dev/null 2>&1 && echo "yes" || echo "no")
            if [ "$has_pi_ext" = "yes" ] || [ "$has_pi_kw" = "yes" ]; then
              echo "✅ package.json has pi manifest (extensions=$has_pi_ext, keyword=$has_pi_kw)"
            else
              echo "❌ FAIL: package.json missing pi.extensions and pi-package keyword"
              errors=$((errors + 1))
            fi
          else
            echo "❌ FAIL: package.json missing"
            errors=$((errors + 1))
          fi
          
          # 3. Check no node_modules/ directory
          if [ -d "${validate_dir}/${pkg_dir}/node_modules" ]; then
            echo "❌ FAIL: node_modules/ found in tarball"
            errors=$((errors + 1))
          else
            echo "✅ No node_modules/ in tarball"
          fi
          
          # Summary
          echo ""
          echo "=== Validation: ${errors} error(s) ==="
          if [ "$errors" -gt 0 ]; then
            echo "::error::Tarball validation failed with ${errors} error(s)"
            rm -rf "$validate_dir"
            exit 1
          fi
          echo "Validation passed for ${tarball}"
          rm -rf "$validate_dir"

      # Build the tag body: strip "packages/" prefix, replace "/" with "--"
      # Then search for release-please tag: {tag-body}-v{version}
      - name: Get release tag
        id: tag
        run: |
          # Tag body: strip packages/ prefix, replace remaining slashes with --
          tag=$(echo "${{ matrix.path }}" | sed 's|packages/||; s|/|--|g')
          echo "Resolved tag body: ${tag}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Upload with robust tag search and diagnostic error output
      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pkg_version=$(jq -r '.version' "${{ matrix.path }}/package.json")
          echo "Searching for release tag matching: ${{ steps.tag.outputs.tag }}-v${pkg_version}"
          release_tag=$(gh release list --limit 20 --json tagName --jq ".[].tagName" | grep -E "${{ steps.tag.outputs.tag }}-v${pkg_version}$|v${pkg_version}$" | head -1)
          if [ -z "$release_tag" ]; then
            echo "::error::Could not find release tag for ${{ matrix.path }} v${pkg_version}"
            echo "Searched pattern: ${{ steps.tag.outputs.tag }}-v${pkg_version}"
            echo "Available tags:"
            gh release list --limit 20 --json tagName --jq ".[].tagName" | sed 's/^/  /'
            exit 1
          fi
          echo "Resolved release tag: ${release_tag}"
          gh release upload "$release_tag" "$tarball" --clobber
          echo "Upload complete: ${tarball} → ${release_tag}"
